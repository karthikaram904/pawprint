<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<link rel="icon" type="image/png" href="img/favicon.png">

     <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css?family=Quantico:400,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,600,700&display=swap" rel="stylesheet">

    <!-- CSS -->

</head>
<body>

<div class="dashboard">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="logo">
                        <a href="./index.html">
                            <img src="img/pawprint-white.png" alt="">
                        </a>
                    </div>

        <ul>
            <li><a href="dashboard.html"><i class="fa fa-home"></i> Dashboard</a></li>
            <li><a href="books.html"><i class="fa fa-calendar"></i> Book Session</a></li>
            <li><a href="photos.html"><i class="fa fa-image"></i> My Photos</a></li>
            <li><a href="orders.html"><i class="fa fa-shopping-cart"></i> Orders</a></li>
            <li><a href="downloads.html"><i class="fa fa-download"></i> Downloads</a></li>
            <li><a href="profile.html"><i class="fa fa-user"></i> Profile</a></li>
            <li><a href="logout.html"><i class="fa fa-user"></i> Log Out</a></li>
        </ul>
    </div>

    <!-- Main -->
    <div class="main">
        <!-- Topbar -->
        <div class="topbar">
            <button id="menu-btn"><i class="fa fa-bars"></i></button>
            <h2>Downloads Dashboard 🐾</h2>
        </div>

       <div class="downloads-page">

    <!-- Header -->
    <div class="page-header">
        <h2>Downloads 📥</h2>
        <p>Access and download your high-quality pet photos</p>
    </div>

    <!-- Top Bar -->
    <div class="download-top">

        <div class="filters">
            <button class="active">All</button>
            <button>Favorites</button>
            <button>Downloaded</button>
        </div>

        <button class="download-all">Download All</button>

    </div>

    <!-- Gallery -->
    <div class="download-grid">

        <div class="download-item">
            <img src="img/portfolio/fea-img4.jpg" alt="">
            <div class="overlay">
                <button><i class="fa fa-eye"></i></button>
                <button><i class="fa fa-download"></i></button>
            </div>
        </div>

        <div class="download-item">
            <img src="img/portfolio/fea-img3.jpg" alt="">
            <div class="overlay">
                <button><i class="fa fa-eye"></i></button>
                <button><i class="fa fa-download"></i></button>
            </div>
        </div>

        <div class="download-item">
            <img src="img/portfolio/fea-img1.jpg" alt="">
            <div class="overlay">
                <button><i class="fa fa-eye"></i></button>
                <button><i class="fa fa-download"></i></button>
            </div>
        </div>

        <div class="download-item">
            <img src="img/portfolio/fea-img2.jpg" alt="">
            <div class="overlay">
                <button><i class="fa fa-eye"></i></button>
                <button><i class="fa fa-download"></i></button>
            </div>
        </div>

    </div>

</div>

    </div>

</div>

<script>
    const btn = document.getElementById("menu-btn");
    const sidebar = document.getElementById("sidebar");

    // Toggle open
    btn.onclick = (e) => {
        e.stopPropagation(); // prevent immediate close
        sidebar.classList.toggle("active");
    };

    // Click outside → close
    document.addEventListener("click", (e) => {
        if (!sidebar.contains(e.target) && !btn.contains(e.target)) {
            sidebar.classList.remove("active");
        }
    });
</script>
</body>
</html>
